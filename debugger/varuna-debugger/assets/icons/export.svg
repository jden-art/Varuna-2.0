        stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <!-- Side feet of tray -->
  <path d="M4 19v1.5a1.5 1.5 0 0 0 1.5 1.5h13A1.5 1.5 0 0 0 20 20.5V19"
        stroke="#000000" stroke-width="2"
